name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt:
    name: Nix format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Check formatting
        run: |
          nix fmt
          git diff --exit-code

  check:
    name: Mix check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29.0.2"
          elixir-version: "1.20.2"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-otp29-elixir1.20.2-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-otp29-elixir1.20.2-

      - name: Install dependencies
        run: mix deps.get

      - name: Run make check
        run: make check

  nix-mix-check:
    name: Nix Mix check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run check
        run: nix build .#checks.x86_64-linux.mix-check -L

  nixos-module-url-allowlist:
    name: NixOS module URL allowlist test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run test
        run: nix build .#checks.x86_64-linux.nixos-module-url-allowlist -L

  nixos-service:
    name: NixOS service test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test uid-range
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run test
        run: nix build .#checks.x86_64-linux.nixos-service -L

  nixos-concurrency:
    name: NixOS concurrency test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test uid-range
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run test
        run: nix build .#checks.x86_64-linux.nixos-concurrency -L

  nixos-deadline:
    name: NixOS deadline test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run test
        run: nix build .#checks.x86_64-linux.nixos-deadline -L

  nixos-tiktok-audio-mux:
    name: NixOS TikTok audio muxing test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test uid-range
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Run test
        run: nix build .#checks.x86_64-linux.nixos-tiktok-audio-mux -L
